name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[openai-compat]" pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest -q

  javascript:
    name: JavaScript helpers
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Test microphone frame helpers
        run: node tests/js/test_helpers.mjs

      - name: Test speaker echo guard
        run: node tests/js/test_speaker_echo_guard.mjs
